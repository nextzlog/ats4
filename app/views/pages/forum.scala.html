@()(implicit in: Injections, admin: Boolean)

@comps.page(title = in.msg("forum"), nav = "forum") {
	@for(station <- in.ats.stations().list().asScala.filter(_.note.nonEmpty)) {
		<figure>
			<blockquote class='blockquote' id='@station.call'>
				@station.note
			</blockquote>
			<figcaption class='blockquote-footer'>
				@station.call
			</figcaption>
		</figure>
	}
}
